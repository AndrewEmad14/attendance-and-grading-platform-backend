info:
  name: List instructors
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseurl}}/users/instructors?page=1"
  params:
    - name: page
      value: "1"
      type: query
    - name: name
      value: Casimir
      type: query
      disabled: true
    - name: compensation_type
      value: internal
      type: query
      disabled: true
    - name: hourly_rate_min
      value: "1"
      type: query
      disabled: true
    - name: hourly_rate_max
      value: "1000"
      type: query
      disabled: true
    - name: fixed_salary_min
      value: ""
      type: query
      disabled: true
    - name: fixed_salary_max
      value: ""
      type: query
      disabled: true
    - name: sort
      value: -hourly_rate
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tag"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Tags]
      summary: Create a predefined tag
      description: Track Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag]
              properties:
                tag:
                  type: string
                  example: "uses AI"
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Tag"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /students/{studentId}/tags:
    parameters:
      - $ref: "#/components/parameters/StudentId"
    get:
      tags: [Tags]
      summary: List tags attached to a student
      description: Visible to every person who grades that student (ACC-5, GRD-8).
      responses:
        "200":
          description: Student tag list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tag"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Tags]
      summary: Attach a tag to a student
      description: Instructor or Track Admin. Tags accumulate across courses (GRD-7, GRD-8).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag_id]
              properties:
                tag_id:
                  type: integer
      responses:
        "201":
          description: Tag attached
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /students/{studentId}/tags/{tagId}:
    parameters:
      - $ref: "#/components/parameters/StudentId"
      - $ref: "#/components/parameters/TagId"
    delete:
      tags: [Tags]
      summary: Remove a tag from a student
      description: Track Admin only.
      responses:
        "204":
          description: Removed
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /students/{studentId}/notes:
    parameters:
      - $ref: "#/components/parameters/StudentId"
    patch:
      tags: [Tags]
      summary: Update free-text notes on a student profile
      description: Instructor or Track Admin. Notes accumulate and are visible to all graders (GRD-8).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Notes updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StudentProfile"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── ANNOUNCEMENTS ───────────────────────────────────────────

  /cohorts/{cohortId}/announcements:
    parameters:
      - $ref: "#/components/parameters/CohortId"
    get:

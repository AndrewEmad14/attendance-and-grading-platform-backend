openapi: 3.1.0

info:
  title: Attendance & Grading Platform API
  version: 1.0.0
  description: |
    REST API for the ITI Attendance & Grading Platform.

    Built with Laravel 13 + Sanctum. All endpoints (except auth) require a Bearer token.
    All responses follow the envelope format: `{ "data": ... }` for single resources,
    `{ "data": [...], "meta": {...}, "links": {...} }` for paginated collections.

    **Roles**: `branch_manager` · `track_admin` · `instructor` · `student`

servers:
  - url: http://127.0.0.1:8000/api
    description: Local development
  - url: https://api.example.com/api
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Login, logout, password reset. No token required.
  - name: Users
    description: Account provisioning (top-down — no self-registration).
  - name: Tracks
    description: Training disciplines within the branch.
  - name: Cohorts
    description: Intakes within a track. One active cohort per track at a time.
  - name: Courses
    description: Graded subjects inside a cohort.
  - name: Lab Groups
    description: Sub-divisions of a cohort (~15 students each).
  - name: Engagements
    description: Teaching bookings (lecture, lab, business session).
  - name: Business Sessions
    description: Cross-track sessions that multiple cohorts may attend.
  - name: Attendance
    description: Per-session scan-in / scan-out records and the attendance ledger.
  - name: Excuse Requests
    description: Student absence excuse workflow (requested → approved | rejected).
  - name: Deliverables
    description: Graded components within a course (labs, exams, projects).
  - name: Submissions
    description: Student work submitted against a deliverable.
  - name: Tags
    description: Predefined and free-text labels attached to a student.
  - name: Announcements
    description: Article-style posts visible in the student feed.
  - name: Analytics
    description: Role-scoped dashboards and at-risk detection.
  - name: Billing
    description: Delivered-hour rollup forwarded to central accounting.

# ─────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────
paths:

  # ── AUTH ────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a Bearer token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@iti.eg
                password:
                  type: string
                  format: password
                  example: secret
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "1|abc123..."
                  token_type:
                    type: string
                    example: Bearer
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current token
      responses:
        "204":
          description: Token revoked
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all tokens for the authenticated user
      responses:
        "204":
          description: All tokens revoked
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send a password reset link
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset link sent
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a token from the email link
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password, password_confirmation]
              properties:
                token:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                password_confirmation:
                  type: string
                  format: password
      responses:
        "200":
          description: Password reset successful
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  # ── USERS ───────────────────────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: List all users
      description: Branch Manager only.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: role
          in: query
          schema:
            type: string
            enum: [branch_manager, track_admin, instructor, student]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Users]
      summary: Provision a new account
      description: |
        Top-down only. Branch Manager creates Track Admins and can create instructors/students.
        Track Admin creates instructors and students within their track.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /users/{userId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: Get a single user
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Users]
      summary: Update a user (name, email, expires_at, role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Users]
      summary: Delete a user account
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── TRACKS ──────────────────────────────────────────────────

  /tracks:
    get:
      tags: [Tracks]
      summary: List all tracks
      responses:
        "200":
          description: Track list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Track"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Tracks]
      summary: Create a track
      description: Branch Manager only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Web Development
      responses:
        "201":
          description: Track created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Track"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tracks/{trackId}:
    parameters:
      - $ref: "#/components/parameters/TrackId"
    get:
      tags: [Tracks]
      summary: Get a single track
      responses:
        "200":
          description: Track detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Track"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Tracks]
      summary: Update a track name
      description: Branch Manager only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Updated track
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Track"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── COHORTS ─────────────────────────────────────────────────

  /tracks/{trackId}/cohorts:
    parameters:
      - $ref: "#/components/parameters/TrackId"
    get:
      tags: [Cohorts]
      summary: List cohorts for a track
      responses:
        "200":
          description: Cohort list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Cohort"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Cohorts]
      summary: Open a new cohort for this track
      description: Branch Manager only. A track may have at most one active cohort (LC-1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CohortCreateRequest"
      responses:
        "201":
          description: Cohort opened
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Cohort"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /cohorts/{cohortId}:
    parameters:
      - $ref: "#/components/parameters/CohortId"
    get:
      tags: [Cohorts]
      summary: Get a cohort
      responses:
        "200":
          description: Cohort detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Cohort"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Cohorts]
      summary: Update cohort (e.g. assign a Track Admin)
      description: Branch Manager only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                track_admin_ids:
                  type: array
                  items:
                    type: integer
                  description: User IDs of Track Admins to assign to this cohort.
                is_active:
                  type: boolean
      responses:
        "200":
          description: Updated cohort
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Cohort"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── COURSES ─────────────────────────────────────────────────

  /cohorts/{cohortId}/courses:
    parameters:
      - $ref: "#/components/parameters/CohortId"
    get:
      tags: [Courses]
      summary: List courses in a cohort
      responses:
        "200":
          description: Course list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Courses]
      summary: Create a course in a cohort
      description: Track Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseCreateRequest"
      responses:
        "201":
          description: Course created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Course"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /courses/{courseId}:
    parameters:
      - $ref: "#/components/parameters/CourseId"
    get:
      tags: [Courses]
      summary: Get a single course
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Course"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Courses]
      summary: Update course name or component weights
      description: Track Admin only. Weights must sum to 100.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseUpdateRequest"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Course"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Courses]
      summary: Delete a course
      description: Track Admin only. Only allowed before any deliverables or submissions exist.
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── LAB GROUPS ──────────────────────────────────────────────

  /cohorts/{cohortId}/lab-groups:
    parameters:
      - $ref: "#/components/parameters/CohortId"
    get:
      tags: [Lab Groups]
      summary: List lab groups for a cohort
      responses:
        "200":
          description: Lab group list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LabGroup"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Lab Groups]
      summary: Create a lab group
      description: Track Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Group A
      responses:
        "201":
          description: Lab group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LabGroup"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /lab-groups/{labGroupId}:
    parameters:
      - $ref: "#/components/parameters/LabGroupId"
    patch:
      tags: [Lab Groups]
      summary: Rename a lab group
      description: Track Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Updated lab group
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LabGroup"
        "403":
          $ref: "#/components/responses/Forbidden"

    delete:
      tags: [Lab Groups]
      summary: Delete a lab group
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /lab-groups/{labGroupId}/students:
    parameters:
      - $ref: "#/components/parameters/LabGroupId"
    get:
      tags: [Lab Groups]
      summary: List students in a lab group
      description: Track Admin sees all; Instructor sees only their assigned groups (ACC-3).
      responses:
        "200":
          description: Student list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StudentProfile"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Lab Groups]
      summary: Assign a student to this lab group
      description: Track Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id]
              properties:
                student_id:
                  type: integer
      responses:
        "201":
          description: Student assigned
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /lab-groups/{labGroupId}/students/{studentId}:
    parameters:
      - $ref: "#/components/parameters/LabGroupId"
      - $ref: "#/components/parameters/StudentId"
    delete:
      tags: [Lab Groups]
      summary: Remove a student from this lab group
      description: Track Admin only.
      responses:
        "204":
          description: Removed
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── ENGAGEMENTS ─────────────────────────────────────────────

  /engagements:
    get:
      tags: [Engagements]
      summary: List engagements
      description: |
        Track Admin sees all engagements in their cohort.
        Instructor sees only their own.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: cohort_id
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [lecture, lab, business_session]
        - name: instructor_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated engagement list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Engagement"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Engagements]
      summary: Create an engagement (teaching booking)
      description: Track Admin only. Polymorphic — specify `engageable_type` and `engageable_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementCreateRequest"
      responses:
        "201":
          description: Engagement created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Engagement"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /engagements/{engagementId}:
    parameters:
      - $ref: "#/components/parameters/EngagementId"
    get:
      tags: [Engagements]
      summary: Get a single engagement
      responses:
        "200":
          description: Engagement detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Engagement"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Engagements]
      summary: Update an engagement
      description: Track Admin only. Cannot update after sessions have been delivered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementUpdateRequest"
      responses:
        "200":
          description: Updated engagement
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Engagement"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Engagements]
      summary: Delete an engagement
      description: Track Admin only. Only if no attendance records exist against it.
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── BUSINESS SESSIONS ───────────────────────────────────────

  /business-sessions:
    get:
      tags: [Business Sessions]
      summary: List business sessions
      responses:
        "200":
          description: Business session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusinessSession"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Business Sessions]
      summary: Create a business session
      description: Track Admin or Branch Manager.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, cohort_ids]
              properties:
                name:
                  type: string
                  example: Career Day
                cohort_ids:
                  type: array
                  items:
                    type: integer
                  description: Which cohorts attend this session (cross-track, ATT-3).
      responses:
        "201":
          description: Business session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessSession"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /business-sessions/{businessSessionId}:
    parameters:
      - $ref: "#/components/parameters/BusinessSessionId"
    get:
      tags: [Business Sessions]
      summary: Get a business session
      responses:
        "200":
          description: Business session detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessSession"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Business Sessions]
      summary: Update a business session (name, cohort list)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                cohort_ids:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Updated business session
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessSession"
        "403":
          $ref: "#/components/responses/Forbidden"

    delete:
      tags: [Business Sessions]
      summary: Delete a business session
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── ATTENDANCE ──────────────────────────────────────────────

  /attendance:
    get:
      tags: [Attendance]
      summary: List attendance records
      description: |
        Track Admin sees all records in their cohort.
        Instructor sees only records for their assigned lab group(s) (ACC-3).
        Student sees only their own records (ACC-4).
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: engagement_id
          in: query
          schema:
            type: integer
        - name: student_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated attendance records
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AttendanceRecord"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Attendance]
      summary: Record a scan-in or scan-out (QR / NFC)
      description: |
        Called by the scanner interface. First call sets `arrived_at`; second call sets `left_at`.
        Instructor only (during their active engagement window).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, engagement_id]
              properties:
                student_id:
                  type: integer
                engagement_id:
                  type: integer
      responses:
        "201":
          description: Attendance record created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceRecord"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /attendance/{attendanceId}:
    parameters:
      - $ref: "#/components/parameters/AttendanceId"
    get:
      tags: [Attendance]
      summary: Get a single attendance record
      responses:
        "200":
          description: Attendance record detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceRecord"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Attendance]
      summary: Manually correct timestamps on a record
      description: Track Admin only. Used for corrections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arrived_at:
                  type: string
                  format: date-time
                left_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Updated attendance record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceRecord"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /students/{studentId}/attendance-ledger:
    parameters:
      - $ref: "#/components/parameters/StudentId"
    get:
      tags: [Attendance]
      summary: Get a student's attendance ledger balance
      description: |
        Returns current balance (starts at 250, deductions per ATT-4/ATT-5).
        Student can only see their own (ACC-4).
      responses:
        "200":
          description: Ledger balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      student_id:
                        type: integer
                      balance:
                        type: integer
                        example: 195
                      deductions:
                        type: array
                        items:
                          $ref: "#/components/schemas/LedgerDeduction"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── EXCUSE REQUESTS ─────────────────────────────────────────

  /excuse-requests:
    get:
      tags: [Excuse Requests]
      summary: List excuse requests
      description: Track Admin sees all in their cohort. Student sees only their own.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          schema:
            type: string
            enum: [requested, approved, rejected]
        - name: student_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated excuse requests
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ExcuseRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Excuse Requests]
      summary: Submit an excuse request
      description: Student only. Multipart/form-data to allow optional attachment (PDF or image, max 1 MB).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [attendance_id, reason]
              properties:
                attendance_id:
                  type: integer
                reason:
                  type: string
                attachment:
                  type: string
                  format: binary
                  description: PDF or image, max 1 MB (EXC-2).
      responses:
        "201":
          description: Excuse request submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ExcuseRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /excuse-requests/{excuseRequestId}:
    parameters:
      - $ref: "#/components/parameters/ExcuseRequestId"
    get:
      tags: [Excuse Requests]
      summary: Get a single excuse request
      responses:
        "200":
          description: Excuse request detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ExcuseRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /excuse-requests/{excuseRequestId}/approve:
    parameters:
      - $ref: "#/components/parameters/ExcuseRequestId"
    post:
      tags: [Excuse Requests]
      summary: Approve an excuse request
      description: Track Admin only. Changes deduction from 25 → 5 points (EXC-3).
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ExcuseRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Already approved or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /excuse-requests/{excuseRequestId}/reject:
    parameters:
      - $ref: "#/components/parameters/ExcuseRequestId"
    post:
      tags: [Excuse Requests]
      summary: Reject an excuse request
      description: Track Admin only. Deduction remains at 25 points.
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ExcuseRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── DELIVERABLES ────────────────────────────────────────────

  /courses/{courseId}/deliverables:
    parameters:
      - $ref: "#/components/parameters/CourseId"
    get:
      tags: [Deliverables]
      summary: List deliverables for a course
      responses:
        "200":
          description: Deliverable list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Deliverable"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Deliverables]
      summary: Create a deliverable for a course
      description: Track Admin only. `type` must be `lab`, `exam`, or `project`. Weights across all deliverables in the course must sum to 100 (GRD-1, GRD-2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliverableCreateRequest"
      responses:
        "201":
          description: Deliverable created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Deliverable"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /deliverables/{deliverableId}:
    parameters:
      - $ref: "#/components/parameters/DeliverableId"
    get:
      tags: [Deliverables]
      summary: Get a single deliverable
      responses:
        "200":
          description: Deliverable detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Deliverable"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Deliverables]
      summary: Update a deliverable
      description: Track Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliverableUpdateRequest"
      responses:
        "200":
          description: Updated deliverable
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Deliverable"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Deliverables]
      summary: Delete a deliverable
      description: Track Admin only. Only if no submissions exist.
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── SUBMISSIONS ─────────────────────────────────────────────

  /deliverables/{deliverableId}/submissions:
    parameters:
      - $ref: "#/components/parameters/DeliverableId"
    get:
      tags: [Submissions]
      summary: List submissions for a deliverable
      description: |
        Instructor sees submissions for their lab group only (ACC-3).
        Track Admin sees all.
        Student sees only their own.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated submissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthenticated"

    post:
      tags: [Submissions]
      summary: Submit work for a deliverable
      description: Student only. Accepts a URL or a direct file upload (POR-4).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [submission_type]
              properties:
                submission_type:
                  type: string
                  enum: [url, file]
                url:
                  type: string
                  format: uri
                  description: Required when `submission_type` is `url`.
                file:
                  type: string
                  format: binary
                  description: Required when `submission_type` is `file`.
      responses:
        "201":
          description: Submission recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Submission"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /submissions/{submissionId}:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    get:
      tags: [Submissions]
      summary: Get a single submission
      responses:
        "200":
          description: Submission detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Submission"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Submissions]
      summary: Grade a submission (set raw_score)
      description: Instructor only, for their assigned lab group (GRD-4). The system normalizes the score automatically (GRD-3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw_score]
              properties:
                raw_score:
                  type: number
                  minimum: 0
                  description: Must not exceed the deliverable's `max_score`.
      responses:
        "200":
          description: Submission graded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Submission"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /submissions/{submissionId}/override:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    post:
      tags: [Submissions]
      summary: Override an instructor's grade
      description: |
        Track Admin only (GRD-6). Requires a mandatory note.
        The original `raw_score` is retained for audit; `override_score` replaces it in calculations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [override_score, override_note]
              properties:
                override_score:
                  type: number
                  minimum: 0
                override_note:
                  type: string
                  minLength: 10
                  description: Mandatory explanation (GRD-6).
      responses:
        "200":
          description: Override applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Submission"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"


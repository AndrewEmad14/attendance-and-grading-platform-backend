            type: integer
          description: Filter to a single cohort.
      responses:
        "200":
          description: Billing rollup
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BillingRollup"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /billing/instructors/{staffProfileId}:
    parameters:
      - name: staffProfileId
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Billing]
      summary: Delivered-hour breakdown for a single staff member
      description: Branch Manager or the staff member themselves.
      responses:
        "200":
          description: Staff billing detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StaffBillingDetail"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

# ─────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  # ── PARAMETERS ──────────────────────────────────────────────
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer

    StudentId:
      name: studentId
      in: path
      required: true
      description: student_profiles.id
      schema:
        type: integer

    TrackId:
      name: trackId
      in: path
      required: true
      schema:
        type: integer

    CohortId:
      name: cohortId
      in: path
      required: true
      schema:
        type: integer

    CourseId:
      name: courseId
      in: path
      required: true
      schema:
        type: integer

    LabGroupId:
      name: labGroupId
      in: path
      required: true
      schema:
        type: integer

    EngagementId:
      name: engagementId
      in: path
      required: true
      schema:
        type: integer

    BusinessSessionId:
      name: businessSessionId
      in: path
      required: true
      schema:
        type: integer

    AttendanceId:
      name: attendanceId
      in: path
      required: true
      schema:
        type: integer

    ExcuseRequestId:
      name: excuseRequestId
      in: path
      required: true
      schema:
        type: integer

    DeliverableId:
      name: deliverableId
      in: path
      required: true
      schema:
        type: integer

    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: integer

    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: integer

    AnnouncementId:
      name: announcementId
      in: path
      required: true
      schema:
        type: integer

    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1

    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 15
        maximum: 100

  # ── RESPONSES ───────────────────────────────────────────────
  responses:
    Unauthenticated:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Unauthenticated.

    Forbidden:
      description: Authenticated but not authorized for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: This action is unauthorized.

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            message: Resource not found.

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
          example:
            message: The given data was invalid.
            errors:
              email:
                - The email field is required.

  # ── SCHEMAS ─────────────────────────────────────────────────
  schemas:

    Error:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    PaginatedMeta:
      type: object
      properties:
        meta:
          type: object
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
        links:
          type: object
          properties:
            first:
              type: string
            last:
              type: string
            prev:
              type: string
            next:
              type: string

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ahmed Hassan
        email:
          type: string
          format: email
          example: ahmed@iti.eg
        role:
          type: string
          enum: [branch_manager, track_admin, instructor, student]
        expires_at:
          type: string
          format: date-time
          description: Account expiry — expired accounts cannot log in (SEC-2).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [name, email, role, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [track_admin, instructor, student]
        password:
          type: string
          format: password
          minLength: 8
        expires_at:
          type: string
          format: date-time
          description: Required for instructors and students. Optional for track admins.
        cohort_id:
          type: integer
          description: Required when role is `student`.
        compensation_type:
          type: string
          enum: [external, internal]
          description: Required when role is `instructor` or `track_admin`.
        hourly_rate:
          type: number
          description: Required when compensation_type is `external` or when instructor is also internal.

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        expires_at:
          type: string
          format: date-time

    Track:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Web Development
        active_cohort:
          $ref: "#/components/schemas/Cohort"
        created_at:
          type: string
          format: date-time

    Cohort:
      type: object
      properties:
        id:
          type: integer
        track_id:
          type: integer
        number:
          type: integer
          example: 45
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CohortCreateRequest:
      type: object
      required: [number]
      properties:
        number:
          type: integer
          description: Intake number, e.g. 45 for "Web — Intake 45".
        track_admin_ids:
          type: array
          items:
            type: integer

    Course:
      type: object
      properties:
        id:
          type: integer
        cohort_id:
          type: integer
        name:
          type: string
          example: JavaScript Fundamentals
        deliverables:
          type: array
          items:
            $ref: "#/components/schemas/Deliverable"
        created_at:
          type: string
          format: date-time

    CourseCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    CourseUpdateRequest:
      type: object
      properties:
        name:
          type: string

    LabGroup:
      type: object
      properties:
        id:
          type: integer
        cohort_id:
          type: integer
        name:
          type: string
          example: Group A
        student_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Engagement:
      type: object
      properties:
        id:
          type: integer
        instructor_id:
          type: integer
          description: References staff_profiles.id
        engageable_type:
          type: string
          enum: [course, lab, business_session]
        engageable_id:
          type: integer
        type:
          type: string
          enum: [lecture, lab, business_session]
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        scheduled_hours:
          type: number
          example: 3.0
        created_at:
          type: string
          format: date-time

    EngagementCreateRequest:
      type: object
      required: [instructor_id, engageable_type, engageable_id, type, starts_at, ends_at, scheduled_hours]
      properties:
        instructor_id:
          type: integer
        engageable_type:
          type: string
          enum: [course, lab, business_session]
        engageable_id:
          type: integer
        type:
          type: string
          enum: [lecture, lab, business_session]
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        scheduled_hours:
          type: number

    EngagementUpdateRequest:
      type: object
      properties:
        instructor_id:
          type: integer
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        scheduled_hours:
          type: number

    BusinessSession:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Career Day
        cohorts:
          type: array
          items:
            $ref: "#/components/schemas/Cohort"
        created_at:
          type: string
          format: date-time

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        student_id:
          type: integer
        engagement_id:
          type: integer
        arrived_at:
          type: string
          format: date-time
        left_at:
          type: string
          format: date-time
        excuse:
          $ref: "#/components/schemas/ExcuseRequest"
        created_at:
          type: string
          format: date-time

    LedgerDeduction:
      type: object
      properties:
        engagement_id:
          type: integer
        points_deducted:
          type: integer
          example: 25
        reason:
          type: string
          enum: [unexcused, excused]
        date:
          type: string
          format: date

    ExcuseRequest:
      type: object
      properties:
        id:
          type: integer
        attendance_id:
          type: integer
        reason:
          type: string
        attachment_path:
          type: string
        status:
          type: string
          enum: [requested, approved, rejected]
        created_at:
          type: string
          format: date-time

    Deliverable:
      type: object
      properties:
        id:
          type: integer
        course_id:
          type: integer
        name:
          type: string
          example: Week 3 Lab
        type:
          type: string
          enum: [lab, exam, project]
        max_score:
          type: integer
          example: 70
          description: Raw maximum used for normalization (GRD-3).
        course_weight:
          type: integer
          example: 40
          description: Points this component is worth within the 100-point course total (GRD-1).
        due_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    DeliverableCreateRequest:
      type: object
      required: [name, type, max_score, course_weight]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [lab, exam, project]
        max_score:
          type: integer
          minimum: 1
        course_weight:
          type: integer
          minimum: 1
          maximum: 100
        due_date:
          type: string
          format: date-time

    DeliverableUpdateRequest:
      type: object
      properties:
        name:
          type: string
        max_score:
          type: integer
          minimum: 1
        course_weight:
          type: integer
          minimum: 1
          maximum: 100
        due_date:
          type: string
          format: date-time

    Submission:
      type: object
      properties:
        id:
          type: integer
        deliverable_id:
          type: integer
        student_id:
          type: integer
        submission_type:
          type: string
          enum: [url, file]
        submission_path:
          type: string
          description: URL or file storage path.
        raw_score:
          type: number
        normalized_score:
          type: number
          description: "(raw_score ÷ deliverable.max_score) × deliverable.course_weight (GRD-3)."
        override_score:
          type: number
        override_note:
          type: string
        days_late:
          type: integer
          description: Full days after due_date at submission time.
        late_penalty:
          type: number
          description: Points deducted for lateness (25% per day, max 4 days — ENG-2).
        final_score:
          type: number
          description: effective score after override and late penalty.
        created_at:
          type: string
          format: date-time

    Tag:
      type: object
      properties:
        id:
          type: integer
        tag:
          type: string
          example: "uses AI"
        created_at:
          type: string
          format: date-time

    StudentProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        cohort_id:
          type: integer
        attendance_balance:
          type: integer
          example: 220
          description: Starts at 250 (ATT-4). Deducted per absence.
        notes:
          type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        user:
          $ref: "#/components/schemas/User"

    Announcement:
      type: object
      properties:
        id:
          type: integer
        cohort_id:
          type: integer
        author_id:
          type: integer
          description: users.id of the author.
        title:
          type: string
        body:
          type: string
          description: Article-style content (ANN-3).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnnouncementCreateRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
        body:
          type: string

    # ── Analytics payloads ───────────────────────────────────

    BranchAnalytics:
      type: object
      description: Branch Manager dashboard (ACC-1).
      properties:
        tracks:
          type: array
          items:
            type: object
            properties:
              track_id:
                type: integer
              track_name:
                type: string
              active_cohort_number:
                type: integer
              attendance_pct:
                type: number
                description: Average attendance percentage across all students.
              average_grade:
                type: number
              pass_rate:
                type: number
              dropout_rate:
                type: number
        attendance_trend:
          type: array
          description: Weekly attendance totals across the branch.
          items:
            type: object
            properties:
              week_start:
                type: string
                format: date
              attendance_pct:
                type: number
        billing_summary:
          $ref: "#/components/schemas/BillingRollup"

    CohortAnalytics:
      type: object
      description: Track Admin dashboard (ACC-2).
      properties:
        grade_distribution:
          type: object
          description: Histogram buckets of final student scores.
          properties:
            buckets:
              type: array
              items:
                type: object
                properties:
                  range:
                    type: string
                    example: "70–79"
                  count:
                    type: integer
        grader_consistency:
          type: array
          description: Mean score per lab group before normalization (bonus analytics).
          items:
            type: object
            properties:
              lab_group_id:
                type: integer
              lab_group_name:
                type: string
              mean_raw_score:
                type: number
              deviation_from_cohort_mean:
                type: number
        attendance_per_session:
          type: array
          items:
            type: object
            properties:
              engagement_id:
                type: integer
              present_count:
                type: integer
              absent_count:
                type: integer
        deliverable_submission_status:
          type: object
          properties:
            submitted:
              type: integer
            missing:
              type: integer
            late:
              type: integer
        at_risk_count:
          type: integer
        tag_flagged_count:
          type: integer

    LabGroupAnalytics:
      type: object
      description: Instructor dashboard (ACC-3).
      properties:
        grade_distribution:
          type: object
          properties:
            buckets:
              type: array
              items:
                type: object
                properties:
                  range:
                    type: string
                  count:
                    type: integer
        submission_tracker:
          type: array
          items:
            type: object
            properties:
              student_id:
                type: integer
              student_name:
                type: string
              deliverable_id:
                type: integer
              status:
                type: string
                enum: [submitted, late, missing]
        delivered_hours:
          type: number
          description: Total hours delivered by this instructor so far.

    StudentAnalytics:
      type: object
      description: Student self-dashboard (POR-1, POR-2, POR-3).
      properties:
        attendance_balance:
          type: integer
        attendance_records:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"
        course_scores:
          type: array
          items:
            type: object
            properties:
              course_id:
                type: integer
              course_name:
                type: string
              score:
                type: number
                description: Computed score out of 100 for this course.
              component_breakdown:
                type: array
                items:
                  type: object
                  properties:
                    deliverable_id:
                      type: integer
                    deliverable_name:
                      type: string
                    normalized_score:
                      type: number
                    weight:
                      type: integer
        grand_total:
          type: number
          description: attendance_balance + sum of course scores.
        progress_over_time:
          type: array
          description: Running grand total at the end of each week.
          items:
            type: object
            properties:
              week_start:
                type: string
                format: date
              grand_total:
                type: number

    AtRiskStudent:
      type: object
      description: Students flagged by the at-risk rule (ANL-1).
      properties:
        student_id:
          type: integer
        student_name:
          type: string
        attendance_balance:
          type: integer
        failing_courses:
          type: array
          items:
            type: object
            properties:
              course_id:
                type: integer
              course_name:
                type: string
              current_score:
                type: number
        risk_reasons:
          type: array
          items:
            type: string
          example:
            - "Attendance balance below 150"
            - "JavaScript Fundamentals score is 48"

    # ── Billing payloads ─────────────────────────────────────

    BillingRollup:
      type: object
      description: Branch billing rollup (BIL-3, BIL-4).
      properties:
        total_internal_hours:
          type: number
        total_external_hours:
          type: number
        cost_per_student:
          type: number
        cohorts:
          type: array
          items:
            type: object
            properties:
              cohort_id:
                type: integer
              cohort_number:
                type: integer
              track_name:
                type: string
              total_cost:
                type: number
        staff:
          type: array
          items:
            $ref: "#/components/schemas/StaffBillingDetail"

    StaffBillingDetail:
      type: object
      properties:
        staff_profile_id:
          type: integer
        name:
          type: string
        compensation_type:
          type: string
          enum: [external, internal]
        hourly_rate:
          type: number
        delivered_hours:
          type: number
        billable_amount:
          type: number
          description: |
            External: delivered_hours × hourly_rate.
            Internal: (delivered_hours × hourly_rate) added on top of fixed salary — salary itself is not tracked here (BIL-2).
        engagements:
          type: array
          items:
            type: object
            properties:
              engagement_id:
                type: integer
              type:
                type: string
              delivered_hours:
                type: number
              date_range:
                type: string
                example: "2024-09-01 / 2024-11-30"
              fixed_salary:
                type: number
                description: Only present for internal staff (Track Admins). The system does not calculate salary, only billable hours on top of it.